image: debian/sid
packages:
  - libreadline-dev
sources:
  - https://git.sr.ht/~thrasymache/rwsh
tasks:
  - build: |
        cd rwsh
        c++ --version
        # cc (Debian 8.3.0-7) 8.3.0  (FSF)
        make
  - install: |
        cd rwsh
        sudo make install
  - rwshrc-basic-devnull: |
        cd rwsh
        make rwshrc-basic-devnull
  - rwshrc-default-devnull: |
        cd rwsh
        make rwshrc-default-devnull
  - test: |
        cd rwsh
        make test
