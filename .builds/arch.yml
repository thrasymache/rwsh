image: archlinux
sources:
  - https://git.sr.ht/~thrasymache/rwsh
tasks:
  - build: |
        cd rwsh
        c++ --version
        # c++ (GCC) 9.1.0
        make
  - install: |
        cd rwsh
        sudo make install
  - rwshrc-basic-devnull: |
        cd rwsh
        make rwshrc-basic-devnull
  - rwshrc-default-devnull: |
        cd rwsh
        make rwshrc-default-devnull
  - test: |
        cd rwsh
        make test
